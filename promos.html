<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <title>🍦Promos Helados.mix</title>
    
    <meta property="og:title" content="🍦 Helados.mix - Pedidos Online">
    <meta property="og:description" content="Elegí tus sabores favoritos y hacé tu pedido por WhatsApp en segundos.">
    <meta property="og:image" content="https://heladosmix.github.io/index.html/logo.jpg?v=500">
    <meta property="og:url" content="https://heladosmix.github.io/index.html">
    <meta property="og:type" content="website">
    <link rel="icon" href="https://heladosmix.github.io/index.html/logo.jpg" type="image/jpeg">
<link rel="apple-touch-icon" href="https://heladosmix.github.io/index.html/logo.jpg">
    <style>
        :root {
            --primario: #ff8fab;
            --secundario: #fb6f92;
            --fondo: #fff0f3;
            --texto: #4a4a4a;
            --celeste: #00bfff;
        }

        body { 
            font-family: 'Segoe UI', sans-serif; 
            background-color: var(--fondo); 
            text-align: center; 
            padding: 20px; 
            color: var(--texto); 
            margin: 0;
        }

        /* --- ESTILO BOTÓN VOLVER --- */
        .btn-volver-celeste {
            display: inline-block;
            background-color: var(--celeste);
            color: white !important;
            padding: 15px 40px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            font-size: 1.2rem;
            margin: 30px 0;
            box-shadow: 0 4px 15px rgba(0,191,255,0.4);
            transition: 0.3s;
            border: none;
            text-align: center;
        }

        .btn-volver-celeste:hover {
            transform: scale(1.05);
            background-color: #0099cc;
        }

        @media (max-width: 768px) {
            body { padding-bottom: 110px !important; }
            .btn-volver-celeste {
                position: fixed; bottom: 20px; left: 50%;
                transform: translateX(-50%); z-index: 9999;
                margin: 0; width: 85%; max-width: 320px;
            }
        }

        .contenedor-promos { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 30px; }
        
        .card { 
            background: white; border-radius: 20px; padding: 20px; width: 180px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 3px solid transparent; 
            transition: 0.3s; cursor: pointer; position: relative;
        }
        .card:hover { transform: translateY(-5px); border-color: var(--primario); }
        .card.activa { border-color: var(--secundario); background: #fff5f7; }
        
        .precio { font-size: 1.3rem; font-weight: bold; color: #333; display: block; margin-top: 10px; }

        #seccion-sabores { 
            display: none; background: white; padding: 25px; border-radius: 25px; 
            max-width: 600px; margin: 20px auto; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: left;
        }

        .categoria-titulo { font-weight: bold; color: var(--secundario); display: block; border-bottom: 2px solid var(--fondo); margin: 15px 0 10px; }
        .lista-sabores { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        label { display: flex; align-items: center; cursor: pointer; font-size: 0.9rem; padding: 5px; border-radius: 5px; }
        input[type="checkbox"] { margin-right: 10px; width: 18px; height: 18px; accent-color: var(--secundario); }

        .btn-ws { 
            background-color: #25d366; color: white; padding: 18px; border: none;
            border-radius: 50px; font-weight: bold; font-size: 1.2rem; cursor: pointer; 
            margin-top: 25px; width: 100%; transition: 0.3s;
        }
        .btn-ws:hover { background-color: #1ebe57; }

        @media (max-width: 600px) { 
            .lista-sabores { grid-template-columns: 1fr; } 
            .card { width: 140px; } 
        }
    </style>
</head>
<body>
  <h1>🍦 Helados.mix 🍦</h1>
    
    <h2 style="color: #fb6f92; margin: 20px 0 5px 0; font-size: 2rem;">¡Promos!</h2>
    
    <span style="color: #00bfff; font-size: 1.6rem; font-weight: bold; display: block; margin-bottom: 30px; line-height: 1.2;">
        Seleccioná tu combo y armalo como quieras
    </span>

    <div class="contenedor-promos">
        <div class="card" id="c1" onclick="ver('Combo 1kg + 1/4kg', '$15.000', 'c1')">
            <h3>1 KG + 1/4 KG</h3>
            <span class="precio">$15.000</span>
        </div>

        <div class="card" id="c2" onclick="ver('Combo 1/2kg + 1/4kg', '$10.000', 'c2')">
            <h3>1/2 KG + 1/4 KG</h3>
            <span class="precio">$10.000</span>
        </div>
        
        <div class="card" id="c3" onclick="ver('1Kg+1/2KG', '$20.000', 'c3')">
            <h3>1KG+1/2KG</h3>
            <span class="precio">$20.000</span>
        </div>

        <div class="card" id="c4" onclick="ver('Súper 2 Kilos', '$24.000', 'c4')">
            <span style="background:var(--primario); color:white; padding:2px 8px; border-radius:10px; font-size:0.7rem; position:absolute; top:-10px; left:50%; transform:translateX(-50%); font-weight:bold;">TOP</span>
            <h3>DOS KILOS</h3>
            <span class="precio">$24.000</span>
        </div>
    </div>

    <div id="seccion-sabores">
        <h2 id="nom-p" style="text-align: center; color: var(--secundario); margin-top:0;"></h2>
        
        <span class="categoria-titulo">Nuestras Cremas 🍦</span>
        <div id="lista-crema" class="lista-sabores">Cargando...</div>

        <span class="categoria-titulo">Frutales al Agua 🍋</span>
        <div id="lista-agua" class="lista-sabores">Cargando...</div>

        <button class="btn-ws" onclick="enviar()">Pedir por WhatsApp </button>
    </div>

    <script>
        const urlPlanilla = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRhxf_pDd_vZrsa7jDx-TtptUbTyuM6WyxnEPz9Kr9RLZht4k6Bym5Zcq6I-jGv6_3kHAm0-GQAB3jh/pub?output=csv';
        let elegida = "";
        let precioElegido = "";

        async function cargarSaboresDesdeExcel() {
            try {
                const res = await fetch(urlPlanilla + '&t=' + new Date().getTime());
                const texto = await res.text();
                const filas = texto.split(/\r?\n/).slice(1);
                
                const contCrema = document.getElementById('lista-crema');
                const contAgua = document.getElementById('lista-agua');
                contCrema.innerHTML = ""; contAgua.innerHTML = "";

                filas.forEach(f => {
                    const col = f.split(',').map(c => c.replace(/"/g, "").trim());
                    if (col.length >= 3 && col[2].toLowerCase() === "si") {
                        const html = `<label><input type="checkbox" value="${col[0]}"> ${col[0]}</label>`;
                        if (col[1] === "saboresCrema") contCrema.innerHTML += html;
                        if (col[1] === "saboresAgua") contAgua.innerHTML += html;
                    }
                });
            } catch (e) {
                console.error("Error al cargar sabores");
            }
        }

        function ver(nombre, precio, id) {
            const panel = document.getElementById('seccion-sabores');
            const titulo = document.getElementById('nom-p');
            const cards = document.querySelectorAll('.card');
            const limpiarChecks = () => { document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false); };

            if (elegida === nombre && panel.style.display === "block") {
                panel.style.display = "none"; elegida = ""; precioElegido = "";
                document.getElementById(id).classList.remove('activa'); limpiarChecks();
            } else {
                limpiarChecks(); cards.forEach(c => c.classList.remove('activa'));
                document.getElementById(id).classList.add('activa');
                elegida = nombre; precioElegido = precio;
                titulo.innerText = "Armando: " + nombre + " (" + precio + ")";
                panel.style.display = "block"; panel.scrollIntoView({ behavior: 'smooth' });
            }
        }

        function enviar() {
            const checks = document.querySelectorAll('input:checked');
            let gustos = []; checks.forEach(c => gustos.push(c.value));
            if (gustos.length === 0) return alert("Por favor, seleccioná al menos un sabor.");
            const miNum = "5491137610574"; 
            const msj = `¡Hola Helados.mix! 🍦\nQuiero la promo: *${elegida}*\nPrecio: *${precioElegido}*\n\nSabores elegidos:\n✅ ${gustos.join("\n✅ ")}`;
            window.open(`https://wa.me/${miNum}?text=${encodeURIComponent(msj)}`, '_blank');
        }

        window.onload = cargarSaboresDesdeExcel;
    </script>

    <div style="text-align: center; width: 100%;">
        <a href="index.html" class="btn-volver-celeste">
            ⬅️ Volver a los Sabores
        </a>
    </div>
</body>
</html>
